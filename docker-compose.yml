version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: footballedge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: footballedge
      POSTGRES_PASSWORD: footballedge_secret
      POSTGRES_DB: footballedge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footballedge -d footballedge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: footballedge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
